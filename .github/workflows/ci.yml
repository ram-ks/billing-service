name: CI

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests & verify
        run: ./mvnw clean verify

      - name: Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-report
          path: target/site/kover/html/
